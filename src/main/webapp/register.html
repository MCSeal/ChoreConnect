<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/ChoreConnectMVP/favicon.svg">
  <title>Register · ChoreConnect</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header container">
    <div class="brand-logo" aria-hidden="true">
      <img class="brand-logo" src="./choreconnect-logo.svg" alt="ChoreConnect Logo">
    </div>
    
    <div class="brand-title">ChoreConnect</div>
  </header>
  
  <main class="container">
    <section class="card" aria-labelledby="es#register-title">
      <h1 id="es#register-title">Create your account</h1>
      
      <!-- The registration form -->
      <form action="/auth/register" method="POST">
        <input type="hidden" name="csrfToken" value="${csrfToken}">
        
        <div class="form-grid cols-2">
          <div>
            <label for="es#reg-name">Full name</label>
            <input class="input" id="es#reg-name" name="fullName" type="text" required>
          </div>
          <div>
            <label for="es#reg-email">Email</label>
            <input class="input" id="es#reg-email" name="email" type="email" required>
          </div>
          <div>
            <label for="es#reg-password">Password</label>
            <input class="input" id="es#reg-password" name="password" type="password" minlength="8" required>
          </div>
          <div>
            <label for="es#reg-confirm">Confirm password</label>
            <input class="input" id="es#reg-confirm" name="confirmPassword" type="password" minlength="8" required>
          </div>
        </div>

        <div class="actions" style="margin-top:12px">
          <button class="btn btn-primary" type="submit">Create account</button>
        </div>
      </form>

      <p>Already have an account? <a href="login.html" class="btn btn-secondary">Sign in</a></p>
    </section>
  </main>
</body>
</html>
