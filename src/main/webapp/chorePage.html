<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/ChoreConnectMVP/favicon.svg">
  <title>Chores Near You · ChoreConnect</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link rel="stylesheet" href="styles.css">
  
  <style>
    #map {
      height: 400px;
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    .chore-table tbody tr:hover {
      background-color: #f0faff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="header container">
    <a class="brand" href="./chores_list.html" aria-label="Chore Tracker">
      <div class="brand-logo" aria-hidden="true">
        <img class="brand-logo" src="./choreconnect-logo.svg" alt="ChoreConnect Logo">
      </div>
      <div class="brand-title">Chore Tracker</div>
    </a>
    <nav class="actions">
      <form method="post" action="/signout">
        <input type="hidden" name="csrfToken" value="${csrfToken}">
        <button class="btn" type="submit">Sign out</button>
      </form>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h1>Chores Nearby</h1>

      <!-- MAP -->
      <div id="map"></div>

      <!-- Hidden lat/lng for selection -->
      <input type="hidden" id="latitude" name="latitude">
      <input type="hidden" id="longitude" name="longitude">

      <!-- Chores table -->
      <div class="card" style="padding:0;">
        <table class="table chore-table" aria-label="Nearby Chores">
          <thead>
            <tr>
              <th>Title</th>
              <th>Due</th>
              <th>Price</th>
              <th>Distance (km)</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <!-- Example row: render dynamically -->
            <!--
            <c:forEach items="${unassignedChores}" var="ch">
              <tr data-lat="${ch.latitude}" data-lng="${ch.longitude}" onclick="focusChore(${ch.latitude}, ${ch.longitude}, '${ch.id}')">
                <td>${ch.title}</td>
                <td>${ch.dueDate}</td>
                <td>${ch.priceAmount}</td>
                <td>${ch.distance}</td>
                <td><a class="btn btn-primary" href="/chores/${ch.id}">View</a></td>
              </tr>
            </c:forEach>
            -->
            <tr>
              <td colspan="5" style="color: var(--muted);">No chores available nearby.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
  // ---------------- MAP LOGIC ----------------
  const map = L.map('map').setView([45.4215, -75.6972], 12); // Ottawa default

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ---------------- Add markers for unassigned chores ----------------
  // Example JS data (replace with dynamic data from backend)
  const chores = [
    {id:1, title:'Mow Lawn', lat:45.4240, lng:-75.6950, price:'$25'},
    {id:2, title:'Clean Garage', lat:45.4190, lng:-75.7000, price:'$40'}
  ];

  chores.forEach(ch => {
    L.marker([ch.lat, ch.lng]).addTo(map)
      .bindPopup(`<strong>${ch.title}</strong><br>Price: ${ch.price}<br><a href="/chores/${ch.id}">View chore</a>`);
  });

  // ---------------- Table row click to focus map ----------------
  function focusChore(lat, lng, id) {
    map.setView([lat, lng], 15);
    // Optionally, open marker popup if you link IDs
  }


  </script>
</body>
</html>
