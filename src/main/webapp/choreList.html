<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/ChoreConnectMVP/favicon.svg">
  <title>Chores Near You · ChoreConnect</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link rel="stylesheet" href="styles.css">

  <style>
    #map {
      height: 400px;
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    .chore-table tbody tr:hover {
      background-color: #f0faff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="header container">
    <a class="brand" href="./chores_list.html" aria-label="Chore Tracker">
      <div class="brand-logo" aria-hidden="true">
        <img class="brand-logo" src="./choreconnect-logo.svg" alt="ChoreConnect Logo">
      </div>
      <div class="brand-title">Chore Tracker</div>
    </a>
    <nav class="actions">
      <form method="post" action="/signout">
        <input type="hidden" name="csrfToken" value="${csrfToken}">
        <button class="btn" type="submit">Sign out</button>
      </form>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h1>Chores Nearby</h1>

      <!-- MAP -->
      <div id="map"></div>

      <!-- Chores table -->
      <div class="card" style="padding:0;">
        <table class="table chore-table" aria-label="Nearby Chores">
          <thead>
            <tr>
              <th>Title</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="chore-table-body">
            <tr>
              <td colspan="3" style="color: var(--muted);">Loading chores...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
  const map = L.map('map').setView([45.4215, -75.6972], 12); 
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Load public chores dynamically
  async function loadChores() {
    try {
      const response = await fetch('/ChoreConnectMVP/api/publicChores');
      const chores = await response.json();

      const tbody = document.getElementById('chore-table-body');
      tbody.innerHTML = '';

      if (chores.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" style="color: var(--muted);">No chores available nearby.</td></tr>`;
        return;
      }

      chores.forEach(ch => {
        // Add marker
        L.marker([ch.lat, ch.lng]).addTo(map)
          .bindPopup(`<strong>${ch.title}</strong><br>Price: ${ch.price}<br><a href="acceptChore?id=${ch.id}">View</a>`);

        // Add table row
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${ch.title}</td>
          <td>${ch.price}</td>
          <td><a class="btn btn-primary" href="acceptChore?id=${ch.id}">Accept</a></td>
        `;
        tbody.appendChild(tr);

        // Click row to focus map
        tr.addEventListener('click', () => {
          map.setView([ch.lat, ch.lng], 15);
        });
      });

    } catch (err) {
      console.error(err);
      document.getElementById('chore-table-body').innerHTML =
        `<tr><td colspan="3" style="color:red;">Error loading chores.</td></tr>`;
    }
  }

  loadChores();
  </script>
</body>
</html>
