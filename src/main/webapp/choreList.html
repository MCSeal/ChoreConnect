<!doctype html>
<html lang="en">

  <meta charset="utf-8">

  <title>Completed Chores · ChoreConnect</title>

<body>
  <header class="header container">
    <a class="brand" href="./chores_list.html" aria-label="Chore Tracker">
      <div class="brand-logo" aria-hidden="true">
        <img class="brand-logo" src="./choreconnect-logo.svg" alt="ChoreConnect Logo">
      </div>
      <div class="brand-title">Chore Tracker</div>
    </a>
    <nav class="actions">
      <form method="post" action="/signout">
        <input type="hidden" name="csrfToken" value="${csrfToken}">
        <button class="btn" type="submit">Sign out</button>
      </form>
    </nav>
  </header>

      <h1 id="completed-chores-title">Completed Chores</h1>

      <div class="card" style="padding: 0;">
        <table class="table" aria-describedby="completed-chores-title">
          <thead>
            <tr>
              <th>Title</th>
              <th>Completed By</th>
              <th>Price</th>
              <th>Review</th>
            </tr>
          </thead>

                  <form method="post" action="/reviews/create">
                    <input type="hidden" name="csrfToken" value="${csrfToken}">
                    <input type="hidden" name="choreId" value="${ch.id}">

                      <option value="">⭐ Rating</option>
                      <option value="5">5</option>
                      <option value="4">4</option>
                      <option value="3">3</option>
                      <option value="2">2</option>
                      <option value="1">1</option>
                    </select>

                    <textarea name="comment" class="input" rows="2"
                      placeholder="Leave a short review..."></textarea>

                    <button class="btn btn-primary" type="submit">
                      Submit
                    </button>
                  </form>
                </td>
              </tr>
            </c:forEach>
            -->
            <tr>
              <td colspan="4" style="color: var(--muted);">
                No completed chores yet.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <p class="footer">Showing ${count:0} completed chores</p>
    <div style="margin-top: 1rem;">
      <a class="btn btn-secondary" href="chorePage.html">Back to Open Chores</a>
    </div>
  </main>
</body>
</html>
